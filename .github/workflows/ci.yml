name: ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - run: shellcheck -S warning $(find scripts skills -name '*.sh')
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json hooks/hooks.json; do
            jq -e . "$f" >/dev/null
          done
  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: find scripts skills -name '*.sh' -print0 | xargs -0 -n1 bash -n
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          v_file=$(cat VERSION)
          v_json=$(jq -r .version .claude-plugin/plugin.json)
          [[ "$v_file" == "$v_json" ]] || { echo "VERSION ($v_file) != plugin.json ($v_json)"; exit 1; }
